<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - QUICK byte</title>
    <link rel="stylesheet" href="registration.css">
</head>

<body>
    <div class="container">
        <div class="form-wrapper">
            <img src="assets/logo.png" alt="QuickByte Logo" class="brand-logo" />
            <h1>QuickByte</h1>
            <p class="subtitle">Taste the speed</p>

            <form id="registrationForm">
                <div class="form-group">
                    <label for="userType">Register As:</label>
                    <select id="userType" name="userType" required onchange="toggleFields()">
                        <option value="">Select Role</option>
                        <option value="customer">Customer</option>
                        <option value="restaurant">Restaurant Manager</option>
                        <option value="rider">Delivery Rider</option>
                    </select>
                </div>

                <!-- Common Fields -->
                <div class="form-group" id="firstNameGroup">
                    <label for="firstName">First Name:</label>
                    <input type="text" id="firstName" name="firstName" required>
                </div>

                <div class="form-group" id="lastNameGroup">
                    <label for="lastName">Last Name:</label>
                    <input type="text" id="lastName" name="lastName" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone" placeholder="03001234567" required>
                </div>

                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password:</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>

                <!-- Restaurant-specific Fields -->
                <div id="restaurantFields" style="display:none;">
                    <div class="form-group">
                        <label for="restaurantName">Restaurant Name:</label>
                        <input type="text" id="restaurantName" name="restaurantName">
                    </div>

                    <div class="form-group">
                        <label for="street">Street Address:</label>
                        <input type="text" id="street" name="street">
                    </div>

                    <div class="form-group">
                        <label for="city">City:</label>
                        <input type="text" id="city" name="city">
                    </div>
                </div>

                <!-- Rider-specific Fields -->
                <div id="riderFields" style="display:none;">
                    <div class="form-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="availability" name="availability" checked>
                            Available for Delivery
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Register</button>
                <button type="reset" class="btn-reset">Clear Form</button>
            </form>

            <div class="links">
                <a href="../index.html">All Labs</a> |
                <a href="login.html">Already have an account? Login here</a> |
                <a href="live_demo.html">Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        function toggleFields() {
            const userType = document.getElementById('userType').value;
            const restaurantFields = document.getElementById('restaurantFields');
            const riderFields = document.getElementById('riderFields');
            const firstNameGroup = document.getElementById('firstNameGroup');
            const lastNameGroup = document.getElementById('lastNameGroup');

            // Hide all role-specific fields first
            restaurantFields.style.display = 'none';
            riderFields.style.display = 'none';

            // Show name fields for customer and rider
            if (userType === 'customer' || userType === 'rider') {
                firstNameGroup.style.display = 'block';
                lastNameGroup.style.display = 'block';
            } else if (userType === 'restaurant') {
                firstNameGroup.style.display = 'none';
                lastNameGroup.style.display = 'none';
            }

            // Show role-specific fields
            if (userType === 'restaurant') {
                restaurantFields.style.display = 'block';
            } else if (userType === 'rider') {
                riderFields.style.display = 'block';
            }
        }
    </script>
</body>

</html>
